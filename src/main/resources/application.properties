spring.application.name=Bookhub
server.servlet.context-path=/bookhub-club/api

spring.datasource.url=jdbc:postgresql://localhost:5432/bookhub
spring.datasource.username=bookhub
spring.datasource.password=bookhub-club

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect